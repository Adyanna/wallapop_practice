<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallapop Practice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../public/stylesheet/productsStyle.css">
    <link rel="stylesheet" href="../public/stylesheet/notificationStyle.css">
    <link rel="stylesheet" href="../public/stylesheet/spinnerStyle.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <img src="/public/images/logo-wallapop-home-v2.svg" class="logo">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse navbarNav" id="navbarNav">
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="notification-container"></section>
        <section class="load-container"></section>
        <section>
            <div class="container min-vh-100 d-flex align-items-center justify-content-center">
                <div class="card shadow-sm p-4" style="max-width: 500px; width: 100%; border-radius: 12px;">

                    <h3 class="mb-4 text-center">Crear cuenta</h3>

                    <form>

                        <!-- Nombres -->
                        <div class="mb-3">
                            <label class="form-label">Nombres</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>

                        <!-- Apellidos -->
                        <div class="mb-3">
                            <label class="form-label">Apellidos</label>
                            <input type="text" class="form-control" name="lastname" required>
                        </div>

                        <!-- País -->
                        <div class="mb-3">
                            <label class="form-label">País</label>
                            <select class="form-select selectpicker" data-live-search="true" name="country" required>
                                <option value="">Selecciona tu país</option>
                                <option>Bolivia</option>
                                <option>Argentina</option>
                                <option>Chile</option>
                                <option>Perú</option>
                                <option>Colombia</option>
                                <option>México</option>
                                <option>España</option>
                                <option>Estados Unidos</option>
                            </select>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" name="password" minlength="6" required>
                        </div>

                        <!-- Confirmar -->
                        <div class="mb-3">
                            <label class="form-label">Confirmar contraseña</label>
                            <input type="password" class="form-control" name="confirmPassword" minlength="6" required>
                        </div>

                        <!-- Botón -->
                        <button type="submit" class="btn btn-dark w-100">
                            Crear cuenta
                        </button>

                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Wallapop Clone. Todos los derechos reservados.</p>
    </footer>
    <script type="module" src="singup.js"></script>

</body>

</html>
