<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../public/stylesheet/login.css">
    <link rel="stylesheet" href="../public/stylesheet/notificationStyle.css">

    <title>Login</title>
</head>

<body>

    <section class="notification-container"></section>
    <div class="login-container">

        <div class="login-card">

            <div class="login-header">
                <img src="../public/images/logo-wallapop-home-v2.svg" class="logo">
                <h2>Bienvenido</h2>
                <p>Inicia sesión para continuar</p>
            </div>

            <form>

                <!-- EMAIL -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input  type="email" class="form-control custom-input" placeholder="correo@email.com" name="user" required>
                </div>

                <!-- PASSWORD -->
                <div class="mb-4">
                    <label class="form-label">Contraseña</label>

                    <input
                        type="password"
                        class="form-control custom-input"
                        minlength="6"
                        placeholder="••••••••"
                        name="password"
                        required>
                </div>
                <button type="submit" class="btn-login"> Iniciar sesión</button>

            </form>
            <div class="login-footer">
                <span>¿No tienes cuenta?</span>
                <a href="../signup/signup.html">
                    Crear cuenta
                </a>
            </div>
        </div>
    </div>
    <script type="module" src="./login.js"></script>
</body>
</html>
